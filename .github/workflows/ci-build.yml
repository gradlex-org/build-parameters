name: CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  gradle-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - uses: testlens-app/setup-testlens@v1.9.3
      - run: "./gradlew :check"
